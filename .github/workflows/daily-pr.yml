name: PR Summary to Google Chat

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-summary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch open PRs
        run: |
          gh pr list --state open --json number,title,author,url,createdAt,updatedAt --limit 100 > open_prs.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send to Google Chat
        run: |
          OPEN_COUNT=$(jq '. | length' open_prs.json)

          TODAY=$(date -u +%Y-%m-%d)
          NEW_TODAY=$(jq -r --arg today "$TODAY" '.[] | select(.createdAt | startswith($today))' open_prs.json | wc -l)

          TOP_PRS=$(jq -r '.[] | "- #\(.number): \(.title) by @\(.author.login) \(.url)"' open_prs.json | head -5)

          MESSAGE="🚀 PR Summary ($(date -u '+%Y-%m-%d'))"
          MESSAGE="$MESSAGE\n\nOpen PRs: $OPEN_COUNT"
          MESSAGE="$MESSAGE\nNew Today: $NEW_TODAY"
          MESSAGE="$MESSAGE\n\nTop PRs:\n$TOP_PRS"
          MESSAGE="$MESSAGE\n\n🙏 Kindly review pending PRs!"

          # Safe JSON creation
          jq -n --arg text "$MESSAGE" '{text: $text}' > payload.json

          curl -X POST \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"
