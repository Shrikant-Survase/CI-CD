name: PR Summary to Google Chat

on:
  pull_request:
    types: [opened, reopened, synchronize,closed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-summary:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Fetch PRs
        run: |
          gh pr list --state open --json number,title,author,url,createdAt,updatedAt --limit 100 > open_prs.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          

      - name: Send summary to Google Chat
        run: |
          OPEN_COUNT=$(jq length open_prs.json)

          TODAY=$(date -u +%Y-%m-%d)

          NEW_TODAY=$(jq --arg today "$TODAY" '[.[] | select(.createdAt | startswith($today))] | length' open_prs.json)

          TOP_PRS=$(jq -r '.[] | "- #\(.number): \(.title) by @\(.author.login) \(.url)"' open_prs.json | head -5)
           MESSAGE=$(printf "🚀 Daily PR Summary (%s)\n\n📊 Stats:\n• Open PRs: %s\n• New today: %s\n📋 Top PRs:\n%s\n🙏 Kindly review pending PRs!" \
          "$TODAY" "$OPEN_COUNT" "$NEW_TODAY" "$TOP_PRS")

          jq -n --arg text "$MESSAGE" '{text: $text}' > payload.json
           curl -X POST \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"
