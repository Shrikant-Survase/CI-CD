name: PR Summary to Google Chat

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch open PRs
        run: |
          gh pr list --state open \
            --json number,title,author,url,createdAt,updatedAt \
            --limit 100 > open_prs.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send formatted card to Google Chat
        run: |
          OPEN_COUNT=$(jq length open_prs.json)
          TODAY=$(date -u +%Y-%m-%d)

          NEW_TODAY=$(jq --arg today "$TODAY" \
            '[.[] | select(.createdAt | startswith($today))] | length' \
            open_prs.json)

          # Format PR list (clickable links)
          TOP_PRS=$(jq -r '.[] | "• <a href=\"\(.url)\">#\(.number) \(.title)</a> by @\(.author.login)"' open_prs.json | head -5)

          # Build Google Chat card JSON
          jq -n \
            --arg date "$TODAY" \
            --arg open "$OPEN_COUNT" \
            --arg new "$NEW_TODAY" \
            --arg prs "$TOP_PRS" \
            '{
              cards: [
                {
                  header: {
                    title: "🚀 Daily PR Summary",
                    subtitle: $date
                  },
                  sections: [
                    {
                      widgets: [
                        {
                          textParagraph: {
                            text: "<b>📊 Stats</b><br/>Open PRs: <b>\($open)</b><br/>New today: <b>\($new)</b>"
                          }
                        }
                      ]
                    },
                    {
                      header: "📋 Top PRs",
                      widgets: [
                        {
                          textParagraph: {
                            text: $prs
                          }
                        }
                      ]
                    },
                    {
                      widgets: [
                        {
                          textParagraph: {
                            text: "🙏 <i>Kindly review pending PRs</i>"
                          }
                        }
                      ]
                    }
                  ]
                }
              ]
            }' > payload.json

          curl -X POST \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"
