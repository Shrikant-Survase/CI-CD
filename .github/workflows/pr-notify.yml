name: PR Notification to Google Chat

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Google Chat
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"🚀 *New Pull Request Created*\n\n👤 *Author:* ${{ github.event.pull_request.user.login }}\n📝 *Title:* ${{ github.event.pull_request.title }}\n🌿 *Branch:* ${{ github.head_ref }} → ${{ github.base_ref }}\n🔗 *Link:* ${{ github.event.pull_request.html_url }}\n\n🙏 Kindly review this PR.\"
          }" \
          "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"
